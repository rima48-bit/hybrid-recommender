<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HybridRec — Admin dashboard with live recommendation system metrics.">
    <title>Admin Dashboard — HybridRec</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        .dash-main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px 48px;
        }
        .dash-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
        }
        .dash-subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 28px;
        }
        .dash-section {
            margin-bottom: 36px;
        }
        .dash-section__title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 14px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .dash-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }
        .dash-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 22px;
            box-shadow: var(--shadow-sm);
            transition: transform var(--transition), box-shadow var(--transition);
        }
        .dash-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .dash-card__label {
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .dash-card__value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.1;
        }
        .dash-card__value--accent {
            color: var(--primary);
        }
        .dash-table {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            border-collapse: collapse;
        }
        .dash-table th,
        .dash-table td {
            padding: 12px 16px;
            text-align: left;
            font-size: 14px;
            border-bottom: 1px solid var(--border-light);
        }
        .dash-table th {
            background: var(--bg-hover);
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.05em;
        }
        .dash-table tbody tr:last-child td {
            border-bottom: 0;
        }
        .dash-table__rank {
            color: var(--text-muted);
            font-weight: 600;
            width: 36px;
        }
        .dash-table__title {
            font-weight: 500;
            color: var(--text);
        }
        .dash-table__category {
            color: var(--text-secondary);
            font-size: 12px;
        }
        .dash-empty {
            color: var(--text-muted);
            font-size: 14px;
            background: var(--bg-card);
            border: 1px dashed var(--border);
            border-radius: var(--radius);
            padding: 20px;
            text-align: center;
        }
        .dash-meta {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .dash-meta__label {
            color: var(--text-secondary);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .dash-meta__value {
            color: var(--text);
            font-weight: 600;
            font-size: 15px;
        }
        .dash-back {
            color: var(--text-inverse);
            text-decoration: none;
            font-size: 14px;
            opacity: 0.8;
            transition: opacity var(--transition);
        }
        .dash-back:hover { opacity: 1; }
        .dash-error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: var(--danger);
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 14px;
            margin-bottom: 20px;
        }
        .dash-loading {
            color: var(--text-secondary);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header__inner">
            <a href="/" class="header__logo">
                <span class="logo-icon">◆</span>
                <span class="logo-text">HybridRec</span>
            </a>
            <div class="header__actions">
                <a href="/" class="dash-back">&larr; Back to site</a>
            </div>
        </div>
    </header>

    <main class="dash-main">
        <h1 class="dash-title">Admin Dashboard</h1>
        <p class="dash-subtitle">Live metrics for the recommendation system.</p>

        <div id="dash-error" class="dash-error" hidden></div>

        <section class="dash-section">
            <h2 class="dash-section__title">Overview</h2>
            <div class="dash-grid" id="dash-overview">
                <div class="dash-loading">Loading…</div>
            </div>
        </section>

        <section class="dash-section">
            <h2 class="dash-section__title">Top 5 recommended products</h2>
            <div id="dash-top">
                <div class="dash-loading">Loading…</div>
            </div>
        </section>

        <section class="dash-section">
            <h2 class="dash-section__title">Model</h2>
            <div class="dash-meta">
                <span class="dash-meta__label">Last trained</span>
                <span class="dash-meta__value" id="dash-last-trained">—</span>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 HybridRec — Powered by TF-IDF, SVD, VADER &amp; PostgreSQL FTS</p>
    </footer>

    <script>
        (function () {
            const overview = document.getElementById('dash-overview');
            const topEl = document.getElementById('dash-top');
            const lastTrainedEl = document.getElementById('dash-last-trained');
            const errorEl = document.getElementById('dash-error');

            function fmtNumber(n) {
                if (n === null || n === undefined) return '—';
                return Number(n).toLocaleString();
            }

            function fmtScore(n) {
                if (n === null || n === undefined) return '—';
                return Number(n).toFixed(2);
            }

            function fmtTimestamp(iso) {
                if (!iso) return 'Never';
                const d = new Date(iso);
                if (isNaN(d.getTime())) return iso;
                return d.toLocaleString();
            }

            function card(label, value, accent) {
                const v = accent
                    ? '<div class="dash-card__value dash-card__value--accent">' + value + '</div>'
                    : '<div class="dash-card__value">' + value + '</div>';
                return '<div class="dash-card">'
                    + '<div class="dash-card__label">' + label + '</div>'
                    + v
                    + '</div>';
            }

            function escapeHtml(s) {
                return String(s == null ? '' : s)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;');
            }

            function renderTop(list) {
                if (!list || !list.length) {
                    topEl.innerHTML = '<div class="dash-empty">No recommendations available yet.</div>';
                    return;
                }
                const rows = list.map((p, i) =>
                    '<tr>'
                    + '<td class="dash-table__rank">#' + (i + 1) + '</td>'
                    + '<td><div class="dash-table__title">' + escapeHtml(p.title) + '</div>'
                    + '<div class="dash-table__category">' + escapeHtml(p.category || '—') + '</div></td>'
                    + '<td>' + fmtScore(p.rating) + '</td>'
                    + '<td>' + fmtNumber(p.interactions) + '</td>'
                    + '</tr>'
                ).join('');
                topEl.innerHTML =
                    '<table class="dash-table">'
                    + '<thead><tr><th></th><th>Product</th><th>Rating</th><th>Interactions</th></tr></thead>'
                    + '<tbody>' + rows + '</tbody></table>';
            }

            function render(data) {
                overview.innerHTML =
                    card('Total products', fmtNumber(data.total_products))
                    + card('Total users', fmtNumber(data.total_users))
                    + card('Total interactions', fmtNumber(data.total_interactions))
                    + card('Avg recommendation score', fmtScore(data.avg_recommendation_score), true)
                    + card('Avg sentiment score', fmtScore(data.avg_sentiment_score), true);
                renderTop(data.top_5_recommended_products);
                lastTrainedEl.textContent = fmtTimestamp(data.model_last_trained);
            }

            function showError(msg) {
                errorEl.textContent = msg;
                errorEl.hidden = false;
                overview.innerHTML = '';
                topEl.innerHTML = '';
                lastTrainedEl.textContent = '—';
            }

            fetch('/api/dashboard')
                .then(r => {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.json();
                })
                .then(render)
                .catch(err => showError('Failed to load dashboard metrics: ' + err.message));
        })();
    </script>
</body>
</html>
