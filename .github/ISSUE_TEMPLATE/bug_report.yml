name: Bug Report
description: Report a bug in the Hybrid Recommender System
title: "[Bug]: "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below clearly.
        > ⚠️ The bot will automatically add `gssoc:approved` and other labels — do not add them manually.

  - type: input
    id: title
    attributes:
      label: Bug Summary
      placeholder: A short, clear description of the bug
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: To Reproduce
      placeholder: |
        1. Run '...'
        2. Go to '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Screenshots / Error Logs
      placeholder: Paste logs or drag screenshots here

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Windows 11, Ubuntu 22.04

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: e.g. 3.10.6

  - type: input
    id: browser
    attributes:
      label: Browser (if frontend issue)
      placeholder: e.g. Chrome 120

  - type: textarea
    id: context
    attributes:
      label: Additional context
      placeholder: Any other context about the problem here.